spring:
  application:
    name: NeuLLMDev
  # LiveReload 默认 35729，多实例/多项目时易冲突；换端口或设 DEVTOOLS_LIVERELOAD_PORT
  devtools:
    livereload:
      port: ${DEVTOOLS_LIVERELOAD_PORT:35247}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Railway：在 Variables 里引用 MySQL 的 MYSQLHOST/MYSQLPORT/MYSQLUSER/MYSQLPASSWORD/MYSQLDATABASE
    # 也可用 SPRING_DATASOURCE_URL 整串覆盖（优先级更高）
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:neusoftllm}?characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:123456}
    hikari:
      connection-timeout: 60000
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql,classpath:schema-migrate.sql

  # QQ 邮箱：须使用「SMTP 授权码」，不是 QQ 登录密码；须在网页邮箱设置里开启 SMTP。
  # 推荐 465 + SSL（与 587+STARTTLS 二选一，避免混用导致 535）。
  # 敏感信息用环境变量：QQ_SMTP_USERNAME、QQ_SMTP_PASSWORD（授权码）
  mail:
    host: smtp.qq.com
    port: 465
    username: ${QQ_SMTP_USERNAME:ysy13044878810@qq.com}
    password: ${QQ_SMTP_PASSWORD:dfnauvvbktqubhfj}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          # QQ 对 HELO/EHLO 主机名较严：默认会用本机名，含中文或异常格式易报 502 Invalid input
          localhost: ${MAIL_SMTP_EHLO_HOST:smtp.qq.com}
          ssl:
            enable: true
            trust: smtp.qq.com
            protocols: TLSv1.2
          starttls:
            enable: false
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000
  servlet:
    multipart:
      max-file-size: ${CLASSROOM_MAX_FILE_SIZE:20MB}
      max-request-size: ${CLASSROOM_MAX_REQUEST_SIZE:25MB}

server:
  # Railway 注入 PORT；本地默认 8082（与 neullmfront 一致）
  port: ${PORT:${SERVER_PORT:8082}}
  tomcat:
    # 默认仅 1MB，作业 docx/pdf 上传需放宽（与 spring.servlet.multipart 保持一致）
    max-http-form-post-size: 25MB
    max-swallow-size: 25MB

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.web: INFO

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.neusoft.edu.neullmdev.entity.reminder,com.neusoft.edu.neullmdev.entity.hotel,com.neusoft.edu.neullmdev.entity.travel,com.neusoft.edu.neullmdev.entity.profile,com.neusoft.edu.neullmdev.entity.communication

# 高德开放平台 Key（用于天气/地理编码）
amap:
  api-key: "0ab38e4aeeda6f0050321c3b74bccea0"

# 腾讯位置服务（美食 / 餐厅 POI 地点搜索）。Key 与 SK 用环境变量：TENCENT_MAP_KEY、TENCENT_MAP_SK
tencent:
  map:
    key: ${TENCENT_MAP_KEY:}
    secret: ${TENCENT_MAP_SK:}

sms:
  api-url: "https://api.neekoft.com/sms/send"
  api-key: "neullm-sms-key-2024"

# 大模型：Kimi（Moonshot https://api.moonshot.cn/v1/chat/completions）
# 生产环境建议 api-key 使用环境变量，例如 api-key: ${MOONSHOT_API_KEY:}
app:
  storage:
    artifact-dir: ${ARTIFACT_DIR:data/artifacts}
  cors:
    # 逗号分隔，生产示例：https://neu-llm.vercel.app,https://your-domain.com
    origins: ${APP_CORS_ORIGINS:http://localhost:5180,http://127.0.0.1:5180,https://neu-llm.vercel.app}
  auth:
    session-hours: 72
  llm:
    api-key: ${MOONSHOT_API_KEY:sk-4xTzitt2R2BLmmcs2xPOZr5LzDOpaxak8VQaHg7t8typIgw4}
    base-url: https://api.moonshot.cn/v1/chat/completions
    model: moonshot-v1-32k
    # 普通重试：主要覆盖 5xx / 网络抖动（4xx 里除 429 外不重试）。
    max-retries: 1
    retry-backoff-ms: 1200
    # 429 限流：Moonshot 按 RPM/TPM/并发等维度限流，短时突发可自动退避重试几次；仍失败则需降频或控制台升级额度。
    retry-429-max-attempts: 2
    retry-429-initial-delay-ms: 4000

  weather:
    enable: false
    key: 124e7e84e5fc7c3538a473c245198147
    url: https://restapi.amap.com/v3/weather/weatherInfo

